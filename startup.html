
<style>
.startup {
    position: fixed !important;
    inset: 0 !important;
    z-index: 9999 !important;
}
.startup-dialog {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
}
.startup-logo {
    width: 96px;
    height: 96px;
    font-size: 96px;
    line-height: 1;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: brightness(0) invert(1);
}
.startup-progress-bar {
    width: 200px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
}
.startup-progress-fill {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.85);
    border-radius: 2px;
    animation: mac-boot 3s ease-in-out forwards;
}
@keyframes mac-boot {
    0%   { width: 0%; }
    30%  { width: 45%; }
    60%  { width: 70%; }
    85%  { width: 90%; }
    100% { width: 100%; }
}
</style>

<div class="startup-dialog">
   <div class="startup-logo" style="font-size:96px; color:white; line-height:1;"></div>
    <div class="startup-progress-bar">
        <div class="startup-progress-fill"></div>
    </div>
</div>
